version: 2

updates:
  # Backend Python
  - package-ecosystem: "pip"
    directory: "/BackEnd"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
    groups:
      python-minor:
        update-types:
          - "minor"
          - "patch"
    # pydantic-core é pinado exato por pydantic (==2.46.4 p/ pydantic 2.13.4).
    # PR avulso quebra resolução de deps. Sobe junto com pydantic.
    ignore:
      - dependency-name: "pydantic-core"
      # fastapi 0.136.3 é release malicioso (MAL-2026-4750): injeta 'fastar' no
      # extra [standard]. PR #35 (2026-06-04) re-subiu 0.136.1 → 0.136.3 como patch.
      # 0.137.1 ainda declara fastar>=0.9.0 no [standard] — cadeia NÃO saneada upstream.
      # Segura fastapi no pin auditado 0.136.1; reavaliar quando fastar sumir do [standard].
      # SCPI instala fastapi puro (sem [standard]), então fastar não é puxado no install.
      - dependency-name: "fastapi"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-patch"

  # App mobile Expo / React Native
  - package-ecosystem: "npm"
    directory: "/app"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "mobile"
    groups:
      js-minor:
        update-types:
          - "minor"
          - "patch"
    # Pacotes gerenciados pelo Expo SDK: atualizar via `expo install --fix`,
    # não por PR avulso do Dependabot (desalinha do SDK).
    ignore:
      - dependency-name: "expo"
      - dependency-name: "expo-*"
      - dependency-name: "@expo/*"
      - dependency-name: "react"
      - dependency-name: "react-dom"
      - dependency-name: "react-native"
      - dependency-name: "react-native-*"
      # Versões ditadas pelo SDK (expo install --check): PR #34 bumpou
      # datetimepicker p/ 9.1.0 e desalinhou do SDK 55 (espera 8.6.0).
      - dependency-name: "@react-native-community/*"
      - dependency-name: "@react-navigation/*"
      # Toolchain pinada pelo SDK 55: eslint 10 quebra eslint-config-expo@55
      # (plugin-react API removida); TS 6 desalinha do expo/tsconfig.base.
      # Sobem juntos no upgrade SDK 56.
      - dependency-name: "eslint"
      - dependency-name: "eslint-config-expo"
      - dependency-name: "typescript"

  # GitHub Actions (versões dos próprios workflows)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels:
      - "ci"
