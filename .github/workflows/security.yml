name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Toda segunda-feira 06:00 UTC (03:00 America/Sao_Paulo)
    - cron: "0 6 * * 1"

permissions:
  contents: read
  pull-requests: read

jobs:
  # -------------------------------------------------------------------------
  # Detecta quais áreas mudaram para evitar rodar checks irrelevantes em PR
  # (PR que só toca BackEnd não dispara npm-audit; PR de app não dispara
  # bandit/pip-audit). Push em main e schedule semanal continuam rodando tudo.
  # -------------------------------------------------------------------------
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v7

      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'BackEnd/**'
              - '.github/workflows/security.yml'
            mobile:
              - 'app/**'
              - '.github/workflows/security.yml'

  # -------------------------------------------------------------------------
  # SAST Python — varre AST do BackEnd em busca de padrões inseguros
  # -------------------------------------------------------------------------
  bandit:
    name: Bandit (SAST Python)
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install Bandit
        run: pip install bandit==1.7.10

      - name: Run Bandit
        # -ll: reporta apenas LOW e acima; -ii: confiança MEDIUM+
        # Falha o pipeline com severidade HIGH (B-codes críticos).
        run: |
          bandit -r BackEnd \
            --exclude BackEnd/tests,BackEnd/__pycache__,BackEnd/logs \
            --severity-level high \
            --confidence-level medium

  # -------------------------------------------------------------------------
  # SCA Python — vulnerabilidades conhecidas em dependências (CVEs)
  # -------------------------------------------------------------------------
  pip-audit:
    name: pip-audit (SCA Python)
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: pip install pip-audit==2.7.3

      - name: Audit BackEnd dependencies
        # PYSEC-2025-183 (PyJWT): disputado pelo mantenedor — exige enforcement de
        # comprimento mínimo de chave pela aplicação. core/auth_utils.py valida
        # SECRET_KEY >= 32 caracteres no boot, satisfazendo a mitigação. Sem fix upstream.
        run: pip-audit --requirement BackEnd/requirements.txt --strict --ignore-vuln PYSEC-2025-183

      - name: Generate SBOM (CycloneDX)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: pip-audit --requirement BackEnd/requirements.txt --format cyclonedx-json --output sbom-backend.json || true

      - name: Upload SBOM artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: sbom-backend
          path: sbom-backend.json
          retention-days: 90

  # -------------------------------------------------------------------------
  # Detecção de segredos no código + histórico do git
  # Roda sempre — segredos importam em qualquer área do repo.
  # -------------------------------------------------------------------------
  gitleaks:
    name: Gitleaks (Secrets Scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # histórico completo para escanear commits antigos

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # -------------------------------------------------------------------------
  # SCA Node — vulnerabilidades nas deps do app mobile (Expo/React Native)
  # -------------------------------------------------------------------------
  npm-audit-mobile:
    name: npm audit (app)
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies (no scripts)
        working-directory: app
        run: npm ci --ignore-scripts

      - name: Audit (high+ severity blocks)
        working-directory: app
        run: npm audit --audit-level=high

  # -------------------------------------------------------------------------
  # Falha em run agendada não bloqueia merge nem aparece em lugar nenhum que a
  # gente olhe no dia a dia — o gitleaks pegou a chave do Firebase em 20/07 e o
  # achado ficou 3 dias sem ação. Abre issue pra falha virar trabalho visível.
  # Reaproveita issue aberta em vez de criar uma por semana.
  # -------------------------------------------------------------------------
  notify-failure:
    name: Abrir issue em falha do scan agendado
    needs: [bandit, pip-audit, gitleaks, npm-audit-mobile]
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              'O **Security Scan** agendado falhou.',
              '',
              `Run: ${runUrl}`,
              '',
              'Abra a run e veja qual job quebrou:',
              '- **Gitleaks** — segredo novo no código ou histórico',
              '- **pip-audit** / **npm audit** — CVE nova em dependência',
              '- **Bandit** — padrão inseguro severidade HIGH no BackEnd',
              '',
              'Se o achado for aceito conscientemente, documente:',
              '`.gitleaksignore` (segredo) ou `--ignore-vuln` no `security.yml` (CVE).',
            ].join('\n');

            const { data: abertas } = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'ci-failure',
            });

            if (abertas.length > 0) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: abertas[0].number, body,
              });
              core.notice(`Comentário adicionado na issue #${abertas[0].number}`);
            } else {
              const { data: nova } = await github.rest.issues.create({
                owner, repo,
                title: 'Security Scan agendado falhou',
                body,
                labels: ['ci-failure', 'security'],
              });
              core.notice(`Issue #${nova.number} aberta`);
            }
